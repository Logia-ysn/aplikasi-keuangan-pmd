<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Ledger book -->
  <rect x="120" y="88" width="272" height="336" rx="16" fill="url(#page)" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="120" y="88" width="24" height="336" rx="8" fill="#1e3a5f" opacity="0.15"/>

  <!-- Ledger lines -->
  <line x1="168" y1="160" x2="360" y2="160" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="168" y1="200" x2="360" y2="200" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="168" y1="240" x2="360" y2="240" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="168" y1="280" x2="360" y2="280" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="168" y1="320" x2="360" y2="320" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="168" y1="360" x2="360" y2="360" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Vertical divider (debit/credit columns) -->
  <line x1="280" y1="130" x2="280" y2="390" stroke="#93c5fd" stroke-width="2"/>

  <!-- Header row -->
  <rect x="144" y="118" width="224" height="32" rx="4" fill="#1e40af" opacity="0.12"/>
  <text x="214" y="140" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="bold" fill="#1e40af" text-anchor="middle">Debit</text>
  <text x="330" y="140" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="bold" fill="#1e40af" text-anchor="middle">Kredit</text>

  <!-- Sample debit entries -->
  <text x="214" y="184" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle">500.000</text>
  <text x="214" y="264" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle">250.000</text>
  <text x="214" y="344" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle">175.000</text>

  <!-- Sample credit entries -->
  <text x="330" y="224" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle">300.000</text>
  <text x="330" y="304" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle">125.000</text>

  <!-- Rice grain / padi - bottom right -->
  <g transform="translate(320, 340) rotate(-30)">
    <!-- Grain 1 -->
    <ellipse cx="48" cy="20" rx="8" ry="18" fill="url(#gold)" opacity="0.95"/>
    <!-- Grain 2 -->
    <ellipse cx="68" cy="10" rx="7" ry="16" fill="url(#gold)" opacity="0.9" transform="rotate(10, 68, 10)"/>
    <!-- Grain 3 -->
    <ellipse cx="30" cy="32" rx="7" ry="16" fill="url(#gold)" opacity="0.85" transform="rotate(-10, 30, 32)"/>
    <!-- Stem -->
    <path d="M48,38 Q50,60 44,80" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M48,38 Q58,55 64,72" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- PMD text badge -->
  <rect x="296" y="430" width="112" height="40" rx="20" fill="#ffffff" opacity="0.2"/>
  <text x="352" y="456" font-family="Helvetica,Arial,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="3">PMD</text>

  <!-- Checkmark circle (verified/balanced) -->
  <circle cx="148" cy="450" r="28" fill="#16a34a" opacity="0.9"/>
  <path d="M134,450 L144,460 L164,438" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
