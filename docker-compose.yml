# ============================================================================
# Keuangan ERP — Docker Compose Project
#
# Setup:
#   cp .env.docker.example .env
#   nano .env                          # ganti JWT_SECRET!
#   docker compose up -d --build       # build & start
#   docker compose logs -f app         # lihat log
#
# Update aplikasi:
#   git pull
#   docker compose up -d --build       # rebuild app saja, data tetap aman
#
# Backup database:
#   docker compose exec db pg_dump -U keuangan keuangan_db > backup.sql
# ============================================================================

services:
  # ── Database ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keuangan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keuangan_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-keuangan_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keuangan}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application (API + Frontend) ──────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-keuangan}:${POSTGRES_PASSWORD:-keuangan_secret_2026}@db:5432/${POSTGRES_DB:-keuangan_db}?schema=public"
      PORT: "3001"
      JWT_SECRET: "${JWT_SECRET:-ganti-dengan-secret-yang-aman}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:5173}"
      NODE_ENV: "production"
    volumes:
      - backups:/app/server/backups
    depends_on:
      db:
        condition: service_healthy

  # ── Auto-Updater (checks GitHub & rebuilds) ────────────────────────────────
  updater:
    image: docker:27-cli
    restart: unless-stopped
    working_dir: /project
    environment:
      UPDATE_INTERVAL: "${UPDATE_INTERVAL:-300}"
      APP_SERVICE: "app"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache git >/dev/null 2>&1
        echo "[UPDATER] Auto-updater started (interval: $${UPDATE_INTERVAL}s)"
        while true; do
          sleep $${UPDATE_INTERVAL}
          cd /project
          git fetch origin main --quiet 2>/dev/null || continue
          LOCAL=$$(git rev-parse HEAD)
          REMOTE=$$(git rev-parse origin/main)
          if [ "$$LOCAL" != "$$REMOTE" ]; then
            echo "[UPDATER] Update found! $$LOCAL -> $$REMOTE"
            git pull origin main 2>&1
            docker compose up -d --build $${APP_SERVICE} 2>&1
            echo "[UPDATER] Rebuild complete at $$(date)"
          fi
        done

volumes:
  pgdata:
  backups:
