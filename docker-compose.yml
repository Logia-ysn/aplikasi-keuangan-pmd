# ============================================================================
# PMD Finance — Docker Compose
#
# Mode 1 — Dua Container (default, best practice):
#   docker compose up -d --build
#
# Mode 2 — All-in-One (1 container, PostgreSQL + App):
#   docker compose --profile allinone up -d --build
#
# Seed data awal (pertama kali):
#   docker compose exec app npx prisma db seed
#
# Setup:
#   cp .env.docker.example .env && nano .env   # edit JWT_SECRET
# ============================================================================

services:
  # ── Mode 1: Dua Container ─────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["", "default"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmd_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-pmd_finance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmd}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["", "default"]
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-pmd}:${POSTGRES_PASSWORD:-pmd_secret_2026}@db:5432/${POSTGRES_DB:-pmd_finance}?schema=public"
      PORT: "3001"
      JWT_SECRET: "${JWT_SECRET:-ganti-dengan-secret-yang-aman}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3001,https://keuangan.panganmasadepan.com}"
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy

  # ── Mode 2: All-in-One (1 container) ──────────────────────────────────────

  pmd:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    restart: unless-stopped
    profiles: ["allinone"]
    ports:
      - "${PORT:-3001}:3001"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmd_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-pmd_finance}
      PORT: "3001"
      JWT_SECRET: "${JWT_SECRET:-ganti-dengan-secret-yang-aman}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3001,https://keuangan.panganmasadepan.com}"
      NODE_ENV: "production"
    volumes:
      - pmd-allinone-data:/var/lib/postgresql/data

volumes:
  pgdata:
  pmd-allinone-data:
